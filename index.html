    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            overflow-y: hidden;
            transition: background-color 0.3s ease;
        }
        
        .app-container {
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-content: space-between;
            flex-direction: column;
        }
        .app-container::-webkit-scrollbar { width: 8px; }
        .app-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .app-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .app-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .dark .app-container::-webkit-scrollbar-track { background: #1f2937; }
        .dark .app-container::-webkit-scrollbar-thumb { background: #4b5563; }

        .brand-red { background-color: #EE414B !important; color: white; }
        .text-brand-red { color: #EE414B !important; }
        .border-brand-red { border-color: #EE414B !important; }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .animate-pulse-fast {
            animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes border-glow {
            0%, 100% { border-color: #EE414B; box-shadow: 0 0 15px rgba(238, 65, 75, 0.2); }
            50% { border-color: #ef4444; box-shadow: 0 0 25px rgba(239, 68, 68, 0.5); }
        }
        .schedule-highlight {
            animation: border-glow 2s infinite;
            background-color: #fef2f2 !important;
        }
        .dark .schedule-highlight {
            background-color: rgba(238, 65, 75, 0.15) !important;
        }
    </style>
